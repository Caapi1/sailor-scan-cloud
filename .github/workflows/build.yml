# Builds the Lane B scan image on an x86 runner and pushes it to GHCR
# (+ a ttl.sh 24h fallback tag in case GHCR package visibility lands
# private — RunPod needs an anonymously pullable image).
# Lives at .github/workflows/build.yml in the public build repo; the
# canonical copy is tools/scan-pipeline/cloud/build.yml in the Sailor repo.
name: build-scan-image
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free runner disk (CUDA images are big)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (load locally for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: sailor-scan-cloud:test
      - name: Smoke test (no GPU on runner — link + version checks only)
        run: |
          docker run --rm sailor-scan-cloud:test bash -c '
            set -e
            ffmpeg -version | head -1
            colmap help >/dev/null 2>&1 || colmap -h >/dev/null 2>&1 || true
            colmap feature_extractor --help >/dev/null
            echo "--- ldd opensplat"
            ldd /usr/local/bin/opensplat | grep "not found" && exit 1 || true
            echo "--- ldd colmap"
            ldd "$(which colmap)" | grep "not found" && exit 1 || true
            python3 -c "import runpod; print(\"runpod\", runpod.__version__)"
          '
      - name: Push to GHCR + ttl.sh
        run: |
          GHCR_TAG="ghcr.io/${GITHUB_REPOSITORY,,}:v1"
          TTL_TAG="ttl.sh/sailor-scan-cloud-${GITHUB_SHA::12}:24h"
          docker tag sailor-scan-cloud:test "$GHCR_TAG"
          docker tag sailor-scan-cloud:test "$TTL_TAG"
          docker push "$GHCR_TAG"
          docker push "$TTL_TAG"
          echo "pushed: $GHCR_TAG and $TTL_TAG"
